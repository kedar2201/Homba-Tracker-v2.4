<!DOCTYPE html>
<html>
<head>
    <title>API Diagnostic</title>
</head>
<body>
    <h1>API Diagnostic Tool</h1>
    <div id="results"></div>
    
    <script>
        const results = document.getElementById('results');
        
        async function runDiagnostics() {
            const token = localStorage.getItem('token');
            
            results.innerHTML += `<p><strong>Token in localStorage:</strong> ${token ? 'YES (' + token.substring(0, 20) + '...)' : 'NO - NOT LOGGED IN!'}</p>`;
            
            // Test backend health
            try {
                const healthRes = await fetch('http://127.0.0.1:8000/health');
                const healthData = await healthRes.json();
                results.innerHTML += `<p><strong>Backend Health:</strong> ✓ ${JSON.stringify(healthData)}</p>`;
            } catch (e) {
                results.innerHTML += `<p><strong>Backend Health:</strong> ✗ ${e.message}</p>`;
            }
            
            // Test dashboard API with token
            if (token) {
                try {
                    const dashRes = await fetch('http://127.0.0.1:8000/api/dashboard/summary', {
                        headers: {
                            'Authorization': `Bearer ${token.trim()}`
                        }
                    });
                    
                    if (dashRes.ok) {
                        const dashData = await dashRes.json();
                        results.innerHTML += `<p><strong>Dashboard API:</strong> ✓ ${JSON.stringify(dashData)}</p>`;
                    } else {
                        const errorText = await dashRes.text();
                        results.innerHTML += `<p><strong>Dashboard API:</strong> ✗ Status ${dashRes.status} - ${errorText}</p>`;
                    }
                } catch (e) {
                    results.innerHTML += `<p><strong>Dashboard API:</strong> ✗ ${e.message}</p>`;
                }
            } else {
                results.innerHTML += `<p><strong>Dashboard API:</strong> Skipped (no token)</p>`;
                results.innerHTML += `<p style="color: red;"><strong>SOLUTION: Please log in at <a href="http://localhost:5174/login">http://localhost:5174/login</a></strong></p>`;
            }
        }
        
        runDiagnostics();
    </script>
</body>
</html>
